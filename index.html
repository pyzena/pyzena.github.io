<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PyZena – Python Genova</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #fff;
      color: #333;
      text-align: center;
    }

    .container {
      max-width: 520px;
      margin: 0 auto;
      padding: 3rem 1.5rem 4rem;
    }

    .logo {
      width: 160px;
      height: 160px;
      object-fit: contain;
      margin-bottom: 1.2rem;
    }

    h1 {
      font-size: 2.2rem;
      font-weight: 700;
      color: #1a2d4f;
      margin-bottom: 0.5rem;
    }

    .subtitle {
      font-size: 1rem;
      color: #555;
      line-height: 1.6;
      margin-bottom: 2.5rem;
    }

    .section {
      margin-bottom: 2.2rem;
    }

    .section h2 {
      font-size: 1.4rem;
      font-weight: 700;
      color: #1a2d4f;
      margin-bottom: 0.35rem;
    }

    .section p {
      font-size: 0.95rem;
      color: #666;
      margin-bottom: 0.9rem;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      width: 100%;
      max-width: 320px;
      padding: 0.75rem 1.5rem;
      margin-bottom: 0.6rem;
      border-radius: 8px;
      border: 2px solid #4a7fc1;
      background: #4a7fc1;
      color: #fff;
      font-size: 0.95rem;
      font-weight: 600;
      text-decoration: none;
      transition: background 0.15s, color 0.15s, border-color 0.15s;
    }

    .btn:hover {
      background: #f7c948;
      border-color: #f7c948;
      color: #1a2d4f;
    }

    .btn-outline {
      background: transparent;
      color: #4a7fc1;
    }

    .btn-outline:hover {
      background: #f7c948;
      border-color: #f7c948;
      color: #1a2d4f;
    }

    footer {
      margin-top: 3rem;
      font-size: 0.82rem;
      color: #aaa;
    }

    footer a {
      color: #888;
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="container">

    <img src="pyzena.jpg" alt="PyZena logo" class="logo" />

    <h1>PyZena</h1>
    <p class="subtitle">
      La community Python di Genova e dintorni.<br />
      Partecipa agli eventi, proponi un talk o scrivici in chat.
    </p>

    <div class="section">
      <a href="https://t.me/py_zena" class="btn">✈️ Telegram</a>
      <a href="https://www.linkedin.com/company/pyzena" class="btn">💼 LinkedIn</a>
      <a href="https://www.instagram.com/_pyzena/" class="btn">📸 Instagram</a>
      <a href="https://github.com/pyzena" class="btn">🐙 GitHub</a>
      <a href="https://docs.google.com/forms/d/1PMlEmAuqSh_Vepy4UTj613ryCgoSebOX-dRQHBSfA0M/" class="btn btn-outline">🎤 Proponi un talk</a>
    </div>

    <footer>
      &copy; 2026 PyZena ·
      <a href="https://www.python.it/">Python Italia</a>
    </footer>

  </div>
</body>
</html>
